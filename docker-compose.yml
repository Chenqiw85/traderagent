services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: traderagent
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  advisor:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trader:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/traderagent
      TZ: America/New_York

volumes:
  pgdata:
